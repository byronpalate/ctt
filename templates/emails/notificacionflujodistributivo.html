<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
</head>
<body style="font-family: Arial, Helvetica, sans-serif; font-size: 14px; color: #111827;">
  <div style="max-width: 640px; margin: 0 auto; padding: 16px;">
    <h3 style="margin: 0 0 12px 0;">{{ title|default:"Notificacion" }}</h3>
    <div style="padding: 12px; border: 1px solid #e5e7eb; background: #f9fafb;">
      {% if mensaje %}{{ mensaje }}{% elif contenido %}{{ contenido|safe }}{% else %}Este correo fue generado automaticamente.{% endif %}
    </div>
  </div>
</body>
</html>
