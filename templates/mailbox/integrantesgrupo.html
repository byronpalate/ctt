<div class="p-2">
    {% for g in datos %}
        <div class="mb-2">
            <div class="d-flex align-items-center">
                <input type="checkbox"
                       class="form-check-input me-2 todos_gruposelectormensaje"
                       ida="{{ g.orden }}"/>
                <a href="javascript:;"
                   class="gruposelectormensaje me-2"
                   ida="{{ g.orden }}"
                   visible="false"
                   title="Ver/ocultar">
                    <i class="icon-list"></i>
                </a>
                <strong>{{ g.grupo }}</strong>
            </div>

            <div class="grupo_{{ g.orden }} hidegrupos"
                 style="display:none; padding-left: 22px; padding-top: 6px;">
                {% for p in g.integrantes %}
                    <div class="form-check">
                        <input type="checkbox"
                               class="form-check-input gruposelectormensaje_{{ g.orden }} individual_{{ p.id }}"
                               idp="{{ p.id }}"/>
                        <label class="form-check-label">
                            <span id="nam_{{ p.id }}">{{ p.nombre }}</span>
                        </label>
                    </div>
                {% empty %}
                    <div class="text-muted" style="font-size: 12px;">Sin integrantes.</div>
                {% endfor %}
            </div>
        </div>
    {% empty %}
        <div class="text-muted">Sin datos.</div>
    {% endfor %}
</div>
